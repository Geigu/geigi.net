<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects — Geigi.net</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsSHA/2.4.2/sha.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#000;color:#ccc;font-family:'Courier New',monospace;}
#wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 0 4rem;}


.nav{width:100%;border-bottom:1px solid #1e1e1e;padding:14px 28px;display:flex;align-items:center;gap:10px;background:#000;}
.nav a{color:#555;text-decoration:none;font-size:13px;}
.nav a:hover{color:#aaa;}
.nav-sep{color:#333;font-size:13px;}
.nav-cur{color:#777;font-size:13px;}


#ascii-out{font-size:9px;line-height:1.15;letter-spacing:1.3px;color:#fff;white-space:pre;display:block;width:100%;text-align:center;padding:2.5rem 0 2rem;background:#000;}


.content{width:820px;max-width:95%;display:flex;flex-direction:column;gap:16px;}


.warn{background:#111;border:1px solid #2a1a00;border-radius:6px;padding:14px 22px;font-size:13px;color:#7a5c1e;display:flex;gap:10px;align-items:flex-start;}
.warn-icon{color:#5a3c00;flex-shrink:0;}


.card{background:#111;border:1px solid #2a2a2a;border-radius:6px;overflow:hidden;}
.card-path{font-size:12px;color:#444;padding:10px 22px;border-bottom:1px solid #1e1e1e;}


.proj-row{display:flex;align-items:baseline;gap:0;border-bottom:1px solid #1a1a1a;text-decoration:none;}
.proj-row:last-child{border-bottom:none;}
.proj-row:hover .proj-name{color:#fff;}
.proj-row:hover .proj-action{color:#666;}
.proj-row:hover{background:#141414;}
.proj-inner{display:flex;justify-content:space-between;align-items:center;width:100%;padding:15px 22px;}
.proj-left{display:flex;align-items:baseline;gap:14px;flex:1;min-width:0;}
.proj-idx{font-size:11px;color:#333;min-width:24px;flex-shrink:0;}
.proj-name{font-size:14px;color:#ddd;font-weight:bold;white-space:nowrap;}
.proj-sep{font-size:12px;color:#2a2a2a;margin:0 10px;}
.proj-desc{font-size:12px;color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.proj-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.proj-badge{font-size:10px;color:#5a3c00;border:1px solid #3a2500;padding:1px 6px;border-radius:3px;}
.proj-action{font-size:12px;color:#333;transition:color 0.12s;}


.footer-card{background:#111;border:1px solid #2a2a2a;border-radius:6px;padding:16px 22px;}
.footer-card p{font-size:12px;color:#444;line-height:1.6;}
</style>
</head>
<body>
<div id="wrap">
  <nav class="nav">
    <a href="/">geigi.net</a>
    <span class="nav-sep">/</span>
    <span class="nav-cur">projects</span>
  </nav>

  <pre id="ascii-out"></pre>

  <div class="content">
    <div class="warn">
      <span class="warn-icon">[!]</span>
      <span>NOTICE &mdash; This page hasn't been updated in a while. Uploading new projects soon.</span>
    </div>

    <div class="card">
      <div class="card-path">/home/geigi/projects &mdash; 11 entries</div>
      <div id="proj-list"></div>
    </div>

    <div class="footer-card">
      <p>> Many more projects to come.<br>> If a project is missing, it's most likely private.</p>
    </div>
  </div>
</div>

<script>
const projects = [
  { title:"QR Project",                desc:"Free client-side QR code generator.",                              url:"https://geigi.net/qr" },
  { title:"Password Tool",             desc:"Secure passwords with custom options, client-side.",               url:"https://geigi.net/password" },
  { title:"Profile Picture Generator", desc:"Crop any picture into a perfect circle.",                          url:"https://geigi.net/pfp",          beta:true },
  { title:"Word Mixer",                desc:"Find the correct word from mixed letters.",                        url:"https://geigi.net/word-mixer",   beta:true },
  { title:"OGArchive",                 desc:"Community archive of OG Minecraft screenshots.",                   url:"https://OGARCHIVE.com" },
  { title:"List Generator",            desc:"Generate every 3-letter combo, 0000-9999, and more.",              url:"https://geigi.net/lists",        beta:true },
  { title:"DCServer.dev",              desc:"High quality Discord server setups.",                              url:"https://dcserver.dev" },
  { title:"To-Do List",               desc:"Build a to-do list and download it as a PNG.",                     url:"https://geigi.net/to-do",        beta:true },
  { title:"2FA Code Generator",        desc:"Generate 2FA codes entirely in your browser.",                     url:"https://geigi.net/2fa" },
  { title:"Discord 4 Letters",         desc:"Collection of rare 4-letter Discord usernames.",                   url:"https://geigi.net/4l" },
  { title:"Crypto-Amount",             desc:"USD to crypto converter at live prices.",                          url:"https://geigi.net/crypto-amount",beta:true },
];

const list = document.getElementById('proj-list');
projects.forEach((p, i) => {
  const a = document.createElement('a');
  a.href = p.url;
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  a.className = 'proj-row';
  a.innerHTML = `<div class="proj-inner">
    <div class="proj-left">
      <span class="proj-idx">${String(i+1).padStart(2,'0')}</span>
      <span class="proj-name">${p.title}</span>
      <span class="proj-sep">//</span>
      <span class="proj-desc">${p.desc}</span>
    </div>
    <div class="proj-right">
      ${p.beta ? '<span class="proj-badge">BETA</span>' : ''}
      <span class="proj-action">open ↗</span>
    </div>
  </div>`;
  list.appendChild(a);
});

// ASCII art
const CHARS=' ..,,::--==++xxXX8800SS##@@';
function render(){
  const COLS=110,ROWS=22,CW=1600,CH=260;
  const cv=document.createElement('canvas');
  cv.width=CW;cv.height=CH;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#000';ctx.fillRect(0,0,CW,CH);
  ctx.fillStyle='#fff';
  ctx.font='bold 210px Arial Black,Impact,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Projects',CW/2,CH/2);
  const cellW=CW/COLS,cellH=CH/ROWS;
  let out='';
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const x=Math.floor(c*cellW),y=Math.floor(r*cellH);
      const pw=Math.max(1,Math.floor(cellW)),ph=Math.max(1,Math.floor(cellH));
      const px=ctx.getImageData(x,y,pw,ph).data;
      let sum=0;for(let i=0;i<px.length;i+=4)sum+=px[i];
      const avg=sum/(px.length/4);
      out+=CHARS[Math.floor((avg/255)*(CHARS.length-1))];
    }
    out+='\n';
  }
  document.getElementById('ascii-out').textContent=out;
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',render);
else render();
</script>
</body>
</html>
